<!DOCTYPE html>
<html lang="th" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบคิวคำสั่งซื้อ • checkorder</title>
    <!-- Google Fonts: IBM Plex Sans Thai & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["'IBM Plex Sans Thai'", "'Inter'", 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#4A7BF8',
                            foreground: '#ffffff',
                            glow: 'rgba(74,123,248,0.15)',
                        },
                        secondary: {
                            DEFAULT: '#7845DE',
                            foreground: '#ffffff',
                        },
                        background: '#09090b',
                        card: {
                            DEFAULT: '#18181b',
                            hover: '#202024',
                            border: '#27272a',
                        }
                    },
                    backgroundImage: {
                        'brand-gradient': 'linear-gradient(267.43deg, #76CEFF -14%, #4A7BF8 103.94%)',
                    }
                }
            }
        }
    </script>
    <!-- Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: 'IBM Plex Sans Thai', 'Inter', sans-serif;
            background-color: #030014;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #030014;
        }

        ::-webkit-scrollbar-thumb {
            background: #1f1f2e;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2b2b3d;
        }
    </style>
</head>

<body class="text-zinc-100 min-h-screen flex flex-col antialiased relative overflow-x-hidden" x-data="queueChecker()">

    <!-- Animated Star Canvas Background -->
    <canvas id="background" class="w-full h-full absolute inset-0 -z-20 opacity-40 pointer-events-none"></canvas>

    <!-- Radial Glow Ellipses -->
    <div
        class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-500/10 blur-[150px] -z-10 pointer-events-none">
    </div>
    <div
        class="absolute top-[30%] right-[-10%] w-[60%] h-[60%] rounded-full bg-purple-500/10 blur-[180px] -z-10 pointer-events-none">
    </div>

    <!-- Navbar -->
    <header class="bg-[#030014]/85 border-b border-white/5 sticky top-0 z-40 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span
                    class="text-2xl font-extrabold tracking-wider bg-clip-text text-transparent bg-brand-gradient">checkorder</span>
                <span
                    class="text-xs bg-primary/20 text-primary border border-primary/30 font-semibold px-2.5 py-0.5 rounded-full">Queue
                    Checker</span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="https://lin.ee/jKRpFHw" target="_blank"
                    class="text-xs font-semibold text-zinc-400 hover:text-white transition-colors flex items-center gap-1">
                    <span>ติดต่อแอดมิน</span>
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl mx-auto w-full px-4 sm:px-6 py-12 flex flex-col justify-center items-center">

        <!-- Header Hero -->
        <div class="text-center space-y-4 mb-10">
            <h1
                class="text-4xl sm:text-5xl font-extrabold tracking-tight bg-clip-text text-transparent bg-brand-gradient">
                ตรวจสอบคิวจองพรีออเดอร์
            </h1>
            <p class="text-zinc-400 max-w-md mx-auto text-sm sm:text-base font-light">
                ระบบเชื่อมต่อบอทหลังบ้านเพื่อตรวจสอบคิวจากเว็บไซต์หลักแบบสดเรียลไทม์
            </p>
        </div>

        <!-- Central Checker Box -->
        <div
            class="bg-card border border-card-border rounded-xl shadow-2xl p-6 sm:p-8 w-full max-w-xl mx-auto transition-all duration-300">
            <form @submit.prevent="checkQueue()" class="space-y-5">
                <div>
                    <label for="username-input"
                        class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2.5">
                        ชื่อผู้ใช้งาน (Username / Email ของบัญชีที่ลงทะเบียน)
                    </label>
                    <div class="relative rounded-lg shadow-sm">
                        <div
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-zinc-500">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="username-input" x-model="username"
                            placeholder="ตัวอย่าง: customer_test_1@example.com"
                            class="block w-full pl-11 pr-4 py-3.5 bg-black/40 border border-zinc-700 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all text-base"
                            required>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <div class="text-[11px] text-zinc-500">
                        บัญชีทดสอบคิว: <button type="button" @click="username = 'customer_test_1@example.com'"
                            class="underline hover:text-zinc-300">Test-1</button>
                        | <button type="button" @click="username = 'customer_test_2@example.com'"
                            class="underline hover:text-zinc-300">Test-2</button>
                    </div>

                    <button type="submit"
                        class="bg-brand-900 bg-primary hover:opacity-95 text-white font-medium py-3 px-6 rounded-lg transition-all flex items-center space-x-2 text-sm shadow-md active:scale-[0.98] duration-150"
                        :disabled="loading">
                        <span x-show="!loading">ตรวจสอบสถานะคิว</span>
                        <span x-show="loading" class="flex items-center gap-2">
                            <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            กำลังดึงข้อมูล...
                        </span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Result Container -->
        <div x-show="searched" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
            class="w-full max-w-xl mx-auto mt-8">
            <!-- Queue Details Card -->
            <template x-if="queueResult">
                <div class="bg-card border border-card-border rounded-xl shadow-2xl overflow-hidden">
                    <div
                        class="border-b border-card-border bg-white/[0.02] px-6 py-5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                        <div>
                            <span
                                class="text-[10px] font-semibold text-zinc-500 uppercase tracking-wider block">ผู้ฝากสไนเปอร์คิว</span>
                            <span class="text-base font-bold text-white mt-1 break-all"
                                x-text="queueResult.username"></span>
                        </div>
                        <div class="text-left sm:text-right">
                            <span
                                class="text-[10px] text-zinc-500 block uppercase tracking-wider">อัปเดตล่าสุดจากบอท</span>
                            <span class="text-xs font-semibold text-zinc-300"
                                x-text="formatDate(queueResult.last_updated)"></span>
                        </div>
                    </div>

                    <div class="p-6 space-y-6">
                        <!-- Queue Number Status -->
                        <div
                            class="grid grid-cols-2 gap-4 text-center bg-black/30 border border-zinc-800 rounded-lg p-4">
                            <div>
                                <span
                                    class="text-[10px] text-zinc-500 block uppercase tracking-wider mb-1">ตำแหน่งคิวพรีออเดอร์</span>
                                <span class="text-3xl font-extrabold text-primary"
                                    x-text="queueResult.queue_position > 0 ? '#' + queueResult.queue_position : '-'"></span>
                            </div>
                            <div>
                                <span
                                    class="text-[10px] text-zinc-500 block uppercase tracking-wider mb-1">สถานะคิว</span>
                                <div class="mt-1 inline-flex items-center px-3 py-1 rounded-full text-xs font-bold"
                                    :class="{
                                         'bg-blue-500/10 text-blue-400 border border-blue-500/20': queueResult.queue_status === 'Processing',
                                         'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20': queueResult.queue_status === 'Completed',
                                         'bg-amber-500/10 text-amber-400 border border-amber-500/20': queueResult.queue_status === 'Pending'
                                     }">
                                    <span class="w-1.5 h-1.5 rounded-full mr-1.5" :class="{
                                              'bg-blue-500': queueResult.queue_status === 'Processing',
                                              'bg-emerald-500': queueResult.queue_status === 'Completed',
                                              'bg-amber-500': queueResult.queue_status === 'Pending'
                                          }"></span>
                                    <span x-text="getQueueLabel(queueResult.queue_status)"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Progress Step Timeline -->
                        <div class="space-y-4">
                            <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider">ไทม์ไลน์การทำงานของบอท
                            </h3>
                            <div class="relative pl-6 border-l border-zinc-800 space-y-6">
                                <!-- Step 1 -->
                                <div class="relative">
                                    <span
                                        class="absolute -left-[30px] top-0.5 flex items-center justify-center w-3.5 h-3.5 rounded-full border bg-primary border-primary shadow-[0_0_10px_rgba(74,123,248,0.5)]">
                                        <svg class="w-2 h-2 text-white" fill="none" viewBox="0 0 24 24"
                                            stroke="currentColor" stroke-width="4.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </span>
                                    <div class="text-xs">
                                        <h4 class="font-bold text-zinc-200">ตรวจสอบสิทธิ์การเป็นสมาชิก (Auto-Login
                                            Verified)</h4>
                                        <p class="text-zinc-400 mt-1 font-light">เซสชันเข้าสู่ระบบปลอดภัย ได้รับ Cookie
                                            Token สำหรับพรีออเดอร์แล้ว</p>
                                    </div>
                                </div>

                                <!-- Step 2 -->
                                <div class="relative">
                                    <span
                                        class="absolute -left-[30px] top-0.5 flex items-center justify-center w-3.5 h-3.5 rounded-full border transition-all duration-300"
                                        :class="queueResult.queue_status !== 'Pending' ? 'bg-primary border-primary' : 'bg-zinc-950 border-zinc-700'">
                                        <svg x-show="queueResult.queue_status !== 'Pending'" class="w-2 h-2 text-white"
                                            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </span>
                                    <div class="text-xs">
                                        <h4 class="font-bold"
                                            :class="queueResult.queue_status !== 'Pending' ? 'text-zinc-200' : 'text-zinc-500'">
                                            เข้าคิวแย่งของอัตโนมัติ (Queue Sniping Engine Active)</h4>
                                        <p class="mt-1 font-light"
                                            :class="queueResult.queue_status !== 'Pending' ? 'text-zinc-400' : 'text-zinc-600'">
                                            บอทกำลังรันสคริปต์ยิง HTTP Request เพื่อเกาะกลุ่มจองตั๋ว/สินค้าคิวต้นๆ</p>
                                    </div>
                                </div>

                                <!-- Step 3 -->
                                <div class="relative">
                                    <span
                                        class="absolute -left-[30px] top-0.5 flex items-center justify-center w-3.5 h-3.5 rounded-full border transition-all duration-300"
                                        :class="queueResult.queue_status === 'Completed' ? 'bg-primary border-primary' : 'bg-zinc-950 border-zinc-700'">
                                        <svg x-show="queueResult.queue_status === 'Completed'"
                                            class="w-2 h-2 text-white" fill="none" viewBox="0 0 24 24"
                                            stroke="currentColor" stroke-width="4.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </span>
                                    <div class="text-xs">
                                        <h4 class="font-bold"
                                            :class="queueResult.queue_status === 'Completed' ? 'text-zinc-200' : 'text-zinc-500'">
                                            จองคิวสำเร็จ & ส่งอีเมลแจ้งเตือน (Auto-Checkout / Notification)</h4>
                                        <p class="mt-1 font-light"
                                            :class="queueResult.queue_status === 'Completed' ? 'text-zinc-400' : 'text-zinc-600'">
                                            ดำเนินการจองและล็อกพิกัดชำระเงินสำเร็จ บิดคำสั่งซื้อเรียบร้อย</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </template>

            <!-- Error Not Found Card -->
            <template x-if="!queueResult">
                <div class="bg-card border border-card-border rounded-xl shadow-lg p-8 text-center space-y-4">
                    <div
                        class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-rose-500/10 text-rose-500 border border-rose-500/20">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                    <div class="space-y-1">
                        <h3 class="text-base font-bold text-zinc-200">ไม่พบบัญชีผู้ฝากจองคิว</h3>
                        <p class="text-xs text-zinc-400 max-w-sm mx-auto font-light">
                            ไม่พบคลังข้อมูลสไนเปอร์คิวสำหรับชื่อผู้ใช้ "<span class="font-semibold text-zinc-300"
                                x-text="username"></span>" กรุณาตรวจสอบหรือแจ้งแอดมินอีกครั้ง
                        </p>
                    </div>
                </div>
            </template>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-card border-t border-card-border py-8 text-center text-xs text-zinc-500 relative z-10">
        <div class="max-w-7xl mx-auto px-4 space-y-2 font-light">
            <p>© 2026 checkorder. All rights reserved. • System Powered by checkorder.com</p>
        </div>
    </footer>

    <!-- Alpine.js Application Store -->
    <script>
        function queueChecker() {
            return {
                username: '',
                loading: false,
                searched: false,
                queueResult: null,

                init() {
                    this.initStars();
                },

                initStars() {
                    const canvas = document.getElementById('background');
                    if (canvas) {
                        const ctx = canvas.getContext('2d');
                        let width = canvas.width = window.innerWidth;
                        let height = canvas.height = window.innerHeight;

                        window.addEventListener('resize', () => {
                            width = canvas.width = window.innerWidth;
                            height = canvas.height = window.innerHeight;
                        });

                        const particles = [];
                        for (let i = 0; i < 70; i++) {
                            particles.push({
                                x: Math.random() * width,
                                y: Math.random() * height,
                                radius: Math.random() * 1.5 + 0.5,
                                vx: Math.random() * 0.2 - 0.1,
                                vy: Math.random() * 0.2 - 0.1,
                                alpha: Math.random() * 0.5 + 0.2
                            });
                        }

                        function animate() {
                            ctx.clearRect(0, 0, width, height);
                            particles.forEach(p => {
                                p.x += p.vx;
                                p.y += p.vy;

                                if (p.x < 0 || p.x > width) p.vx *= -1;
                                if (p.y < 0 || p.y > height) p.vy *= -1;

                                ctx.beginPath();
                                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                                ctx.fill();
                            });
                            requestAnimationFrame(animate);
                        }
                        animate();
                    }
                },

                async checkQueue() {
                    const query = this.username.trim();
                    if (!query) return;

                    this.loading = true;
                    this.searched = false;
                    this.queueResult = null;

                    try {
                        // Dynamically use localhost:3000 if loaded from VS Code Live Server (port 5500)
                        const host = window.location.port === '3000' ? '' : 'http://localhost:3000';
                        const response = await fetch(`${host}/api/check-queue?username=${encodeURIComponent(query)}`);
                        if (response.ok) {
                            const data = await response.json();
                            this.queueResult = data.success ? data.data : null;
                        } else {
                            this.queueResult = null;
                        }
                    } catch (err) {
                        console.error('Connection error:', err);
                        this.queueResult = null;
                    } finally {
                        this.loading = false;
                        this.searched = true;
                    }
                },

                getQueueLabel(status) {
                    const labels = {
                        'Pending': 'กำลังรอคิวเริ่มบอท',
                        'Processing': 'บอทกำลังแย่งจองคิว',
                        'Completed': 'ดำเนินการกดสำเร็จเสร็จสิ้น'
                    };
                    return labels[status] || status;
                },

                formatDate(dateStr) {
                    if (!dateStr) return 'ไม่ทราบเวลา';
                    const date = new Date(dateStr);
                    return date.toLocaleString('th-TH', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            };
        }
    </script>
</body>

</html>
